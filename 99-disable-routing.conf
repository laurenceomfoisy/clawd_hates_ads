# /etc/sysctl.d/99-disable-routing.conf
# CRITICAL: Prevents Bell Giga Hub from blacklisting server MAC address
#
# Docker needs ip_forward=1 for container networking.
# But with send_redirects=1, the server broadcasts ICMP redirects,
# making the Bell router think it's a rogue gateway → MAC blacklist.
#
# This file keeps Docker working while preventing the blacklist.

# Docker needs this - DO NOT disable
net.ipv4.ip_forward = 1

# CRITICAL: Disable ICMP redirects (prevents rogue router detection)
net.ipv4.conf.all.send_redirects = 0
net.ipv4.conf.default.send_redirects = 0
net.ipv4.conf.eno1.send_redirects = 0

# Security hardening: Don't accept ICMP redirects either
net.ipv4.conf.all.accept_redirects = 0
net.ipv4.conf.default.accept_redirects = 0
net.ipv4.conf.eno1.accept_redirects = 0
